server:
  port: 8080

spring:
  application:
    name: sms-admin
  datasource:
    url: jdbc:mysql://localhost:3306/sms_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

auth:
  jwt:
    secret: ${JWT_SECRET:BoRuiSmsPlatformJwtSecretKey2024MustBe32BytesLong!}
    expire-hours: ${JWT_EXPIRE_HOURS:24}

logging:
  level:
    com.borui.sms: DEBUG
    com.baomidou.mybatisplus: DEBUG
